services:
  # 1. The PostgreSQL Database Container
  postgres-db:
    image: postgres:15
    container_name: resume_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 180404 # using the password you set
      POSTGRES_DB: resume_screener_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 10s
      timeout: 5s
      retries: 5

  # 2. The Python ML Service Container
  ml-service:
    build:
      context: ./ml-service
    container_name: ml_brain
    ports:
      - "8000:8000"
    environment:
      # Optional: disable tracking/huggingface logs
      - HF_HUB_DISABLE_SYMLINKS_WARNING=1

  # 3. The Java Spring Boot Backend Container
  backend:
    build:
      context: ./backend
    container_name: resume_backend
    ports:
      - "8080:8080"
    depends_on:
      postgres-db:
        condition: service_healthy
      ml-service:
        condition: service_started
    environment:
      # Override the application.properties URL to point to the docker network instead of localhost
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres-db:5432/resume_screener_db
      - ML_SERVICE_URL=http://ml-service:8000

volumes:
  # This makes sure database data isn't deleted when you shut Docker down
  postgres_data:
